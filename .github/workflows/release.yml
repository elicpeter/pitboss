name: release

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  upload-assets:
    name: upload (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-13
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Build
        run: cargo build --release --bin pitboss --target ${{ matrix.target }}

      - name: Package
        id: package
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          name="pitboss-${tag}-${{ matrix.target }}"
          staging="dist/${name}"
          mkdir -p "${staging}"
          cp "target/${{ matrix.target }}/release/pitboss" "${staging}/"
          cp README.md LICENSE-MIT LICENSE-APACHE "${staging}/"
          archive="${name}.tar.gz"
          tar -czf "${archive}" -C dist "${name}"
          shasum -a 256 "${archive}" > "${archive}.sha256"
          echo "archive=${archive}" >> "${GITHUB_OUTPUT}"
          echo "checksum=${archive}.sha256" >> "${GITHUB_OUTPUT}"

      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${GITHUB_REF_NAME}" \
            "${{ steps.package.outputs.archive }}" \
            "${{ steps.package.outputs.checksum }}" \
            --clobber
